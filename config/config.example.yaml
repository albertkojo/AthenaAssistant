assistant:
  name: "Athena"
  wake_word: "athena"
  persona: >
    You are Athena, a calm, witty British female AI assistant.
    You speak concisely, help with engineering and coding,
    and can control the user's Windows system via defined skills.

audio:
  input_device: "default"
  output_device: "default"
  tts_voice: "en-gb-female-1"  # placeholder, will match an actual Piper voice later

llm:
  provider: "ollama"
  model: "llama3.1:8b"

ui:
  show_hologram: true
  show_speech_bubble: true
  start_in_tray: true
