assistant:
  name: "Athena"
  wake_word: "athena"
  persona: >
    You are Athena, a calm, witty British female AI assistant.
    You speak with a British tone, concise but warm, and you help the user
    with software, computer engineering, and automation on their Windows machine.

audio:
  input_device: "default"
  output_device: "default"
  tts_voice: "en-gb-female-1"  # placeholder, will match an actual Piper voice later

llm:
  provider: "ollama"
  model: "llama3.2:3b"
  max_history_messages: 12      # limit context size
  max_tokens: 160               # keep replies focused

stt:
  command:
    model_size: "medium.en"         # better quality for explicit voice chat
    device: "cpu"
    compute_type: "int8"
    sample_rate: 16000  
    chunk_duration: 3.0         
    silence_threshold: 0.02                 
    followup_timeout: 18.0 

tts:
  voice: "en-GB-SoniaNeural"

ui:
  show_hologram: true
  show_speech_bubble: true
  start_in_tray: true
